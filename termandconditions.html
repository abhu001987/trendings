<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Reads</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 20px;
position:sticky;
top:0;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
z-index:1000;
}

.menu{
font-size:24px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#203a43;
transition:.35s;
z-index:999;
}

.sidebar.open{
left:0;
}

.sidebar-header{
display:flex;
justify-content:space-between;
padding:16px;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.close-btn{
cursor:pointer;
font-size:20px;
}

.sidebar a{
display:block;
padding:15px 20px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.sidebar a:hover{
background:#2c5364;
}

/* FEATURED */

.featured{
padding:10px 20px;
}

.section-title{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.quiz{
color:#ff6a00;
text-decoration:none;
font-weight:600;
}

/* SLIDER */

.slider{
position:relative;
overflow:hidden;
border-radius:12px;
}

.slides{
display:flex;
transition:transform .4s;
}

.slide{
min-width:100%;
position:relative;
}

.slide img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
filter:brightness(.8);
}

.slide span{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:6px 10px;
border-radius:6px;
font-size:13px;
}

.slider-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
border:none;
color:white;
font-size:18px;
padding:5px 10px;
cursor:pointer;
border-radius:6px;
}

.prev{left:10px}
.next{right:10px}

/* TOPICS */

.topics{
padding:16px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,minmax(0,1fr));
gap:14px;
margin-top:10px;
}

.topic{
text-align:center;
}

/* make the whole card clickable */

.topic a{
text-decoration:none;
color:white;
display:block;
}

/* icon */

.topic img{
width:48px;
height:48px;
border-radius:12px;
background:white;
padding:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
object-fit:contain;
display:block;
margin:0 auto;
}

/* label */

.topic p{
font-size:11px;
margin-top:4px;
}

/* POSTER */

.poster{
margin:20px;
border-radius:14px;
overflow:hidden;
position:relative;
box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

.poster img{
width:100%;
height:160px;
object-fit:cover;
filter:brightness(.75);
}

.poster-content{
position:absolute;
bottom:12px;
left:14px;
}

.poster-content h4{
font-size:16px;
margin-bottom:3px;
}

.poster-content p{
font-size:12px;
opacity:.9;
}

/* FOOTER */

footer{
text-align:center;
padding:10px;
font-size:12px;
opacity:.8;
margin-bottom:10px;
}

</style>
</head>

<body>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
}

let index=0;

function nextSlide(){
const slides=document.getElementById("slides");
index++;
if(index>2) index=0;
slides.style.transform="translateX(-"+index*100+"%)";
}

function prevSlide(){
const slides=document.getElementById("slides");
index--;
if(index<0) index=2;
slides.style.transform="translateX(-"+index*100+"%)";
}

</script>

</body>
</html>
