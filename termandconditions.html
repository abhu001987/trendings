<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Reads</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f4f4;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
position:relative;
}

.header h1{
font-size:18px;
}

.menu{
font-size:22px;
cursor:pointer;
}

.logo{
height:32px;
}

/* DROPDOWN */

.dropdown{
display:none;
position:absolute;
top:50px;
left:10px;
background:white;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
width:180px;
overflow:hidden;
}

.dropdown a{
display:block;
padding:10px;
text-decoration:none;
color:#333;
border-bottom:1px solid #eee;
}

.dropdown a:hover{
background:#f2f2f2;
}

/* MAIN */

main{
overflow:auto;
}

/* FEATURED */

.featured{
padding:10px 15px;
}

.section-title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.quiz{
color:#7a2df3;
font-weight:bold;
text-decoration:none;
}

.slider{
position:relative;
overflow:hidden;
border-radius:12px;
}

.slides{
display:flex;
transition:transform .4s;
}

.slide{
min-width:100%;
position:relative;
}

.slide img{
width:100%;
height:170px;
object-fit:cover;
border-radius:12px;
}

.slide a{
position:absolute;
bottom:10px;
left:10px;
color:white;
font-weight:bold;
background:rgba(0,0,0,0.5);
padding:5px 10px;
border-radius:5px;
text-decoration:none;
font-size:14px;
}

/* SLIDER BUTTONS */

.slider-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
border:none;
color:white;
font-size:20px;
padding:6px 10px;
cursor:pointer;
border-radius:6px;
}

.prev{left:10px}
.next{right:10px}

/* DOTS */

.dots{
text-align:center;
margin-top:5px;
}

.dots span{
height:6px;
width:6px;
background:#ccc;
display:inline-block;
border-radius:50%;
margin:3px;
}

.dots .active{
background:black;
}

/* TOPICS */

.topics{
padding:10px 15px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-top:10px;
}

.topic{
text-align:center;
}

.topic img{
width:52px;
height:52px;
border-radius:12px;
background:white;
padding:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
display:block;
margin:auto;
}

.topic p{
font-size:12px;
margin-top:4px;
}

/* FOOTER */

footer{
text-align:center;
padding:12px;
background:white;
font-size:13px;
color:#666;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header class="header">

<div class="menu" onclick="toggleMenu()">☰</div>

<h1>Home</h1>

<img class="logo" src="https://studymate81.wordpress.com/wp-content/uploads/2025/12/jps_for_tree-removebg-preview.png">

<div class="dropdown" id="menu">
<a href="https://en.wikipedia.org/wiki/About_us" target="_blank">About Us</a>
<a href="https://en.wikipedia.org/wiki/Privacy_policy" target="_blank">Privacy Policy</a>
<a href="https://en.wikipedia.org/wiki/Mobile_app_rating" target="_blank">Rate Us</a>
</div>

</header>

<main>

<!-- FEATURED -->

<section class="featured">

<div class="section-title">
<h3>Featured Stories</h3>
<a class="quiz" href="https://en.wikipedia.org/wiki/Quiz" target="_blank">Quiz</a>
</div>

<div class="slider">

<div class="slides" id="slides">

<div class="slide">
<img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f">
<a href="https://en.wikipedia.org/wiki/Economic_Survey_of_India">Economic Survey</a>
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf">
<a href="https://en.wikipedia.org/wiki/Indian_economy">Indian Economy</a>
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1526304640581-d334cdbbf45e">
<a href="https://en.wikipedia.org/wiki/Climate_change">Climate Change</a>
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1569025743873-ea3a9ade89f9">
<a href="https://en.wikipedia.org/wiki/Science">Science & Tech</a>
</div>

</div>

<button class="slider-btn prev" onclick="prevSlide()">❮</button>
<button class="slider-btn next" onclick="nextSlide()">❯</button>

</div>

<div class="dots">
<span class="active"></span>
<span></span>
<span></span>
<span></span>
</div>

</section>

<!-- TOPICS -->

<section class="topics">

<h3>Filter By Topics</h3>

<div class="grid">

<div class="topic"><img src="https://img.icons8.com/color/96/india.png"><p>All</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/book.png"><p>Daily</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/combo-chart.png"><p>Economy</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/edit.png"><p>Editorial</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/forest.png"><p>Environment</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/parliament.png"><p>Governance</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/taj-mahal.png"><p>History</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/handshake.png"><p>I.R</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/video.png"><p>Sansad TV</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/india-map.png"><p>Schemes</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/dna-helix.png"><p>Science</p></div>
<div class="topic"><img src="https://img.icons8.com/color/96/conference.png"><p>Social</p></div>

</div>

</section>

</main>

<footer>
Quick reads, smarter insights
</footer>

<script>

function toggleMenu(){
let menu=document.getElementById("menu");
menu.style.display = menu.style.display==="block" ? "none" : "block";
}

let index=0;
const slides=document.getElementById("slides");

function nextSlide(){
index++;
if(index>3) index=0;
slides.style.transform="translateX(-"+index*100+"%)";
}

function prevSlide(){
index--;
if(index<0) index=3;
slides.style.transform="translateX(-"+index*100+"%)";
}

</script>

</body>
</html>
