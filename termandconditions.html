<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Reads</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.header h1{
font-size:20px;
margin:0;
}

.menu,.login{
font-size:22px;
cursor:pointer;
}

/* FEATURED */

.featured{
padding:15px;
}

.section-title{
display:flex;
justify-content:space-between;
align-items:center;
}

.quiz{
color:#7a2df3;
font-weight:bold;
}

.slider{
margin-top:10px;
}

.slide{
position:relative;
}

.slide img{
width:100%;
border-radius:12px;
}

.slide p{
position:absolute;
bottom:10px;
left:15px;
color:white;
font-weight:bold;
background:rgba(0,0,0,0.5);
padding:5px 10px;
border-radius:5px;
}

/* DOTS */

.dots{
text-align:center;
margin-top:8px;
}

.dots span{
height:6px;
width:6px;
background:#ccc;
display:inline-block;
border-radius:50%;
margin:3px;
}

.dots .active{
background:black;
}

/* TOPICS */

.topics{
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:15px;
}

.topic{
text-align:center;
}

.topic img{
width:55px;
height:55px;
border-radius:12px;
background:white;
padding:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.topic p{
font-size:13px;
margin-top:6px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<header class="header">
<div class="menu">☰</div>
<h1>Home</h1>
<div class="login">⇥</div>
</header>

<section class="featured">

<div class="section-title">
<h2>Featured Stories</h2>
<span class="quiz">Quiz</span>
</div>

<div class="slider">
<div class="slide">
<img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f">
<p>Economic Survey 2024-25</p>
</div>
</div>

<div class="dots">
<span></span>
<span></span>
<span class="active"></span>
<span></span>
</div>

</section>

<section class="topics">

<h2>Filter By Topics</h2>

<div class="grid">

<div class="topic">
<img src="https://img.icons8.com/color/96/india.png">
<p>All</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/book.png">
<p>Daily</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/combo-chart.png">
<p>Economy</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/edit.png">
<p>Editorial</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/forest.png">
<p>Environment</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/parliament.png">
<p>Governance</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/taj-mahal.png">
<p>History</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/handshake.png">
<p>I.R</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/video.png">
<p>Sansad TV</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/india-map.png">
<p>Schemes</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/dna-helix.png">
<p>Science</p>
</div>

<div class="topic">
<img src="https://img.icons8.com/color/96/conference.png">
<p>Social</p>
</div>

</div>

</section>

<footer>
Quick reads, smarter insights
</footer>

</body>
</html>
