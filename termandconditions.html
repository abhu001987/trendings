.dropdown{
display:none;
position:absolute;
top:60px;
left:10px;
background:white;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
width:180px;
overflow:hidden;
}

.dropdown a{
display:block;
padding:12px;
text-decoration:none;
color:#333;

}

.dropdown a:hover{
background:#f2f2f2;
}

.featured{

}

}

.slider{
margin-top:10px;
}

.slide{
position:relative;
}

.slide img{
width:100%;
border-radius:12px;
}

.slide p{
position:absolute;
bottom:10px;
left:15px;
color:white;
font-weight:bold;

padding:5px 10px;
border-radius:5px;
