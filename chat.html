<!DOCTYPE html>

<html lang="en">
<head>

<title>Community Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

html,body{
height:100%;
width:100%;
overflow-x:hidden;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
flex-direction:column;
}

/* LOGIN PAGE */

#loginPage{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
text-align:center;
}

#loginBtn{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:10px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

/* CHAT */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
}

#messages{
flex:1;
display:flex;
flex-direction:column;
overflow-y:auto;
padding:15px;
padding-bottom:150px;
-webkit-overflow-scrolling:touch;
}

.message{
max-width:75%;
padding:12px;
margin:6px 0;
border-radius:12px;
font-size:15px;
word-wrap:break-word;
}

.other{
background:rgba(0,0,0,0.35);
align-self:flex-start;
}

.me{
background:#ff6a00;
align-self:flex-end;
color:white;
}

.admin{
border:2px solid #00ffc8;
background:#0f3d3d;
}

.username{
font-weight:600;
margin-right:5px;
}

/* INPUT */

#inputArea{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
gap:8px;
padding:10px 12px;
background:rgba(0,0,0,0.65);
}

#messageInput{
flex:1;
padding:12px;
border:none;
border-radius:12px;
}

#sendBtn{
width:75px;
border:none;
border-radius:12px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<h2>Join Community Chat</h2>
<button id="loginBtn">Login with Google</button>

</div>

<!-- CHAT PAGE -->

<div id="chatPage">

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Type message...">
<button id="sendBtn">Send</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getAuth, signInWithPopup, GoogleAuthProvider }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* FIREBASE CONFIG */

const app=initializeApp({
apiKey:"AIzaSy...",
authDomain:"community-chat-ffd34.firebaseapp.com",
projectId:"community-chat-ffd34"
});

const db=getFirestore(app);
const auth=getAuth();

/* USER STATE */

let user=null;
let username="";
let lastMessageTime=0;

/* 🔐 SET YOUR ADMIN UID HERE */

const ADMIN_UID="PASTE_YOUR_UID_HERE";

/* LOGIN */

document.getElementById("loginBtn").onclick=async()=>{

const provider=new GoogleAuthProvider();
const result=await signInWithPopup(auth,provider);

user=result.user;

console.log("Your UID:",user.uid);

/* ADMIN CHECK */

if(user.uid===ADMIN_UID){
username=user.displayName+" (Admin)";
}else{
username=user.displayName;
}

document.getElementById("loginPage").style.display="none";
document.getElementById("chatPage").style.display="flex";

};

/* LOAD MESSAGES */

const messages=document.getElementById("messages");

const q=query(
collection(db,"messages"),
orderBy("time","asc"),
limit(50)
);

onSnapshot(q,(snap)=>{

messages.innerHTML="";

snap.docs.forEach(doc=>{

const m=doc.data();
const isMe=m.name===username;
const isAdminMsg=m.name.includes("(Admin)");

messages.innerHTML+=`
<div class="message ${isMe?"me":"other"} ${isAdminMsg?"admin":""}">
<span class="username">${m.name}:</span> ${m.text}
</div>
`;

});

messages.scrollTop=messages.scrollHeight;

});

/* SEND MESSAGE */

document.getElementById("sendBtn").onclick=()=>{

const input=document.getElementById("messageInput");
const text=input.value.trim();

if(!text) return;

/* 3 sec cooldown */

if(Date.now()-lastMessageTime<3000){
alert("Wait 3 seconds");
return;
}
lastMessageTime=Date.now();

/* SEND */

addDoc(collection(db,"messages"),{
name:username,
text:text,
time:serverTimestamp()
});

input.value="";

};

</script>

</body>
</html>
