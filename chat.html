<!DOCTYPE html>

<html lang="en">
<head>

<title>Community Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* NAME SCREEN */

#nameScreen{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#nameInput{
padding:12px;
border:none;
border-radius:8px;
width:260px;
margin-top:15px;
}

#joinBtn{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

/* CHAT PAGE */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
}

#chatMessages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin:8px 0;
padding:8px 12px;
background:rgba(0,0,0,0.35);
border-radius:8px;
width:fit-content;
max-width:70%;
}

.username{
color:#ffb347;
font-weight:600;
margin-right:6px;
}

/* INPUT AREA */

#chatInput{
display:flex;
padding:15px;
background:rgba(0,0,0,0.25);
}

#messageInput{
flex:1;
padding:12px;
border:none;
border-radius:8px;
margin-right:10px;
}

#sendBtn{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<!-- NAME SCREEN -->

<div id="nameScreen">

<h2>Enter your name to join chat</h2>

<input id="nameInput" placeholder="Your name">

<button id="joinBtn">Join Chat</button>

</div>

<!-- CHAT PAGE -->

<div id="chatPage">

<div id="chatMessages"></div>

<div id="chatInput">

<input id="messageInput" placeholder="Type message">

<button id="sendBtn">Send</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA7wwgFsSyhUK-C6C-TE64yH1Ksldm7A_E",
authDomain: "community-chat-ffd34.firebaseapp.com",
projectId: "community-chat-ffd34",
storageBucket: "community-chat-ffd34.firebasestorage.app",
messagingSenderId: "45644496109",
appId: "1:45644496109:web:9ad0351a6592114d66e0e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username="";

/* JOIN CHAT */

document.getElementById("joinBtn").onclick=()=>{

username=document.getElementById("nameInput").value;

if(username==="") return;

document.getElementById("nameScreen").style.display="none";
document.getElementById("chatPage").style.display="flex";

};

/* LOAD MESSAGES */

const chatMessages=document.getElementById("chatMessages");

const q=query(
collection(db,"messages"),
orderBy("time","desc"),
limit(50)
);

onSnapshot(q,(snapshot)=>{

chatMessages.innerHTML="";

snapshot.forEach(doc=>{

const m=doc.data();

chatMessages.innerHTML+=`
<div class="message">
<span class="username">${m.name}:</span>
${m.text}
</div>
`;

});

chatMessages.scrollTop=chatMessages.scrollHeight;

});

/* SEND MESSAGE */

document.getElementById("sendBtn").onclick=sendMessage;

function sendMessage(){

const input=document.getElementById("messageInput");

const text=input.value;

if(text==="") return;

addDoc(collection(db,"messages"),{

name:username,
text:text,
time:Date.now()

});

input.value="";

}

</script>

</body>
</html>
