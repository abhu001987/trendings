<!DOCTYPE html>
<html lang="en">
<head>

<title>Community Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

html,body{
height:100%;
width:100%;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
flex-direction:column;
}

/* LOGIN */

#loginPage{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
padding:20px;
}

#loginBtn{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:10px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

/* CHAT */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
padding-bottom:90px;
}

/* MESSAGES */

.message{
max-width:75%;
padding:12px;
margin:6px 0;
border-radius:12px;
font-size:15px;
word-wrap:break-word;
}

.other{
background:rgba(0,0,0,0.35);
align-self:flex-start;
}

.me{
background:#ff6a00;
align-self:flex-end;
color:white;
}

.admin{
border:2px solid #00ffc8;
background:#0f3d3d;
}

.username{
font-weight:600;
margin-right:5px;
}

/* INPUT */

#inputArea{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
gap:8px;
padding:10px;
background:rgba(0,0,0,0.75);
}

#messageInput{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-size:14px;
}

#sendBtn{
width:80px;
border:none;
border-radius:12px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

/* MOBILE FIX */

@media(max-width:600px){
#sendBtn{width:70px;}
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">
<h2>Join Community Chat</h2>
<button id="loginBtn">Login with Google</button>
</div>

<!-- CHAT -->

<div id="chatPage">
<div id="messages"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Type message...">
<button id="sendBtn">Send</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getAuth, signInWithPopup, GoogleAuthProvider }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* CONFIG */

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"community-chat-ffd34.firebaseapp.com",
projectId:"community-chat-ffd34"
});

const db = getFirestore(app);
const auth = getAuth(app); // ✅ FIXED

let user=null;
let username="";
let lastMessageTime=0;

/* 🔐 ADMIN UID */

const ADMIN_UID="PASTE_YOUR_UID_HERE";

/* LOGIN */

document.getElementById("loginBtn").onclick=async()=>{

try{

const provider=new GoogleAuthProvider();
const result=await signInWithPopup(auth,provider);

user=result.user;

console.log("Your UID:",user.uid);

/* ADMIN */

if(user.uid===ADMIN_UID){
username=user.displayName+" (Admin)";
}else{
username=user.displayName;
}

/* SWITCH UI */

document.getElementById("loginPage").style.display="none";
document.getElementById("chatPage").style.display="flex";

}catch(err){
console.error(err);
alert("Login failed: "+err.message);
}

};

/* LOAD MESSAGES */

const messages=document.getElementById("messages");

const q=query(
collection(db,"messages"),
orderBy("time","asc"),
limit(50)
);

onSnapshot(q,(snap)=>{

messages.innerHTML="";

snap.docs.forEach(doc=>{

const m=doc.data();

if(!m.name || !m.text) return;

const isMe=m.name===username;
const isAdminMsg=m.name.includes("(Admin)");

const div=document.createElement("div");
div.className="message "+(isMe?"me":"other")+(isAdminMsg?" admin":"");

div.innerHTML=`<span class="username">${m.name}:</span> ${m.text}`;

messages.appendChild(div);

});

messages.scrollTop=messages.scrollHeight;

});

/* SEND */

document.getElementById("sendBtn").onclick=send;

function send(){

const input=document.getElementById("messageInput");
const text=input.value.trim();

if(!text) return;

/* COOLDOWN */

if(Date.now()-lastMessageTime<3000){
alert("Wait 3 seconds");
return;
}

lastMessageTime=Date.now();

/* SEND */

addDoc(collection(db,"messages"),{
name:username,
text:text,
time:serverTimestamp()
});

input.value="";

}

</script>

</body>
</html>
