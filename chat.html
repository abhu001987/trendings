<!DOCTYPE html>

<html lang="en">
<head>

<title>Community Chat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

html,body{
height:100%;
width:100%;
overflow-x:hidden;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
flex-direction:column;
}

/* NAME PAGE */

#namePage{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
text-align:center;
}

#usernameInput{
width:90%;
max-width:320px;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

#joinBtn{
margin-top:15px;
padding:12px 28px;
border:none;
border-radius:10px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

/* GUIDELINES */

.guidelines{
margin-top:20px;
background:rgba(0,0,0,0.35);
border-radius:10px;
max-width:420px;
width:100%;
height:220px;
overflow-y:auto;
padding:15px;
font-size:13px;
}

/* CHAT PAGE */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
}

/* MESSAGE AREA */

#messages{
flex:1;
display:flex;
flex-direction:column;
overflow-y:auto;
padding:15px;
padding-bottom:150px;
-webkit-overflow-scrolling:touch;
}

/* MESSAGE BUBBLES */

.message{
max-width:75%;
padding:12px 14px;
margin:6px 0;
border-radius:12px;
font-size:15px;
word-wrap:break-word;
}

/* OTHER USERS */

.other{
background:rgba(0,0,0,0.35);
align-self:flex-start;
}

/* YOUR MESSAGE */

.me{
background:#ff6a00;
color:white;
align-self:flex-end;
}

.username{
font-weight:600;
margin-right:5px;
}

/* INPUT BAR */

#inputArea{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
align-items:center;
gap:8px;
padding:10px 12px;
background:rgba(0,0,0,0.65);
box-sizing:border-box;
}

/* INPUT */

#messageInput{
flex:1;
min-width:0;
padding:12px;
border:none;
border-radius:12px;
font-size:15px;
}

/* SEND BUTTON */

#sendBtn{
flex-shrink:0;
width:75px;
padding:12px 0;
border:none;
border-radius:12px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<!-- NAME PAGE -->

<div id="namePage">

<h2>Enter your name to join chat</h2>

<input id="usernameInput" placeholder="Your name">

<button id="joinBtn">Join Chat</button>

<div class="guidelines">

<h3>Community Guidelines</h3>

<ul>
<li>Be respectful to everyone.</li>
<li>No harassment or hate speech.</li>
<li>No spam or repeated messages.</li>
<li>No sexual or explicit content.</li>
<li>No illegal content.</li>
<li>No sharing personal information.</li>
<li>Links are blocked.</li>
<li>Keep the chat friendly.</li>
</ul>

</div>

</div>

<!-- CHAT PAGE -->

<div id="chatPage">

<div id="messages"></div>

<div id="inputArea">

<input id="messageInput" placeholder="Type message (max 15 words)...">

<button id="sendBtn">Send</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA7wwgFsSyhUK-C6C-TE64yH1Ksldm7A_E",
authDomain:"community-chat-ffd34.firebaseapp.com",
projectId:"community-chat-ffd34",
storageBucket:"community-chat-ffd34.firebasestorage.app",
messagingSenderId:"45644496109",
appId:"1:45644496109:web:9ad0351a6592114d66e0e4"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let username="";
let lastMessageTime=0;

/* BANNED WORDS */

const bannedWords=[
"porn",
"sex",
"xxx",
"fuck",
"sexy",
"childporn",
"abuse",
"spam",
"scam"
];

/* JOIN CHAT */

document.getElementById("joinBtn").onclick=()=>{

const name=document.getElementById("usernameInput").value.trim();

if(name===""){
alert("Please enter your name");
return;
}

username=name;

document.getElementById("namePage").style.display="none";
document.getElementById("chatPage").style.display="flex";

};

/* LOAD MESSAGES */

const messages=document.getElementById("messages");

const q=query(
collection(db,"messages"),
orderBy("time","asc"),
limit(50)
);

onSnapshot(q,(snapshot)=>{

messages.innerHTML="";

snapshot.docs.forEach(doc=>{

const m=doc.data();
const isMe=m.name===username;

messages.innerHTML+=`
<div class="message ${isMe ? "me" : "other"}">
<span class="username">${m.name}:</span> ${m.text}
</div>
`;

});

messages.scrollTop=messages.scrollHeight;

});

/* SEND MESSAGE */

document.getElementById("sendBtn").onclick=sendMessage;

function sendMessage(){

const input=document.getElementById("messageInput");
const text=input.value.trim();

if(text==="") return;

/* 3 SECOND COOLDOWN */

const now=Date.now();

if(now-lastMessageTime<3000){
alert("Please wait 3 seconds before sending another message.");
return;
}

lastMessageTime=now;

/* WORD LIMIT */

const wordCount=text.split(/\s+/).length;

if(wordCount>15){
alert("Message cannot exceed 15 words.");
return;
}

/* BLOCK LINKS */

if(text.includes("http")||text.includes("www")){
alert("Links are not allowed.");
return;
}

/* CLEAN TEXT */

const cleaned=text.toLowerCase().replace(/[\s\.\-_]/g,'');

/* BAD WORD CHECK */

for(let word of bannedWords){
if(cleaned.includes(word)){
alert("Your message contains blocked words.");
return;
}
}

/* SEND */

addDoc(collection(db,"messages"),{
name:username,
text:text,
time:serverTimestamp()
});

input.value="";

}

</script>

</body>
</html>
