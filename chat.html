<!DOCTYPE html>

<html lang="en">
<head>

<title>Community Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

#namePage{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
text-align:center;
}

#usernameInput{
width:90%;
max-width:320px;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

#joinBtn{
margin-top:15px;
padding:12px 28px;
border:none;
border-radius:10px;
background:#ff6a00;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.guidelines{
margin-top:20px;
background:rgba(0,0,0,0.35);
border-radius:10px;
max-width:420px;
width:100%;
height:220px;
overflow-y:auto;
padding:15px;
font-size:13px;
line-height:1.6;
text-align:left;
}

#chatPage{
display:none;
flex-direction:column;
height:100vh;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
padding-bottom:90px;
}

.message{
background:rgba(0,0,0,0.35);
padding:10px 14px;
margin:10px 0;
border-radius:10px;
font-size:15px;
max-width:90%;
word-wrap:break-word;
}

.username{
color:#ffb347;
font-weight:600;
margin-right:6px;
}

#inputArea{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
align-items:center;
gap:8px;
padding:10px;
background:rgba(0,0,0,0.45);
}

#messageInput{
flex:1;
min-width:0;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
}

#sendBtn{
flex-shrink:0;
width:70px;
padding:12px 0;
border:none;
border-radius:10px;
background:#ff6a00;
color:white;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div id="namePage">

<h2>Enter your name to join chat</h2>

<input id="usernameInput" placeholder="Your name">

<button id="joinBtn">Join Chat</button>

<div class="guidelines">

<h3>Community Guidelines</h3>

<ul>
<li>Be respectful to everyone.</li>
<li>No harassment or hate speech.</li>
<li>No spam or repeated messages.</li>
<li>No illegal or harmful content.</li>
<li>No sexual or explicit content.</li>
<li>Do not share personal information.</li>
<li>Keep conversation friendly.</li>
</ul>

</div>

</div>

<div id="chatPage">

<div id="messages"></div>

<div id="inputArea">

<input id="messageInput" placeholder="Type message (max 15 words)...">

<button id="sendBtn">Send</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA7wwgFsSyhUK-C6C-TE64yH1Ksldm7A_E",
authDomain: "community-chat-ffd34.firebaseapp.com",
projectId: "community-chat-ffd34",
storageBucket: "community-chat-ffd34.firebasestorage.app",
messagingSenderId: "45644496109",
appId: "1:45644496109:web:9ad0351a6592114d66e0e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username="";

const bannedWords = [
"spam",
"scam",
"fuck",
"porn",
"sex",
"xxx",
"sexy",
"childporn",
"abuse"
];

document.getElementById("joinBtn").onclick=()=>{

const name=document.getElementById("usernameInput").value;

if(name===""){
alert("Please enter your name");
return;
}

username=name;

document.getElementById("namePage").style.display="none";
document.getElementById("chatPage").style.display="flex";

};

const messages=document.getElementById("messages");

const q=query(
collection(db,"messages"),
orderBy("time","desc"),
limit(50)
);

onSnapshot(q,(snapshot)=>{

messages.innerHTML="";

const docs=snapshot.docs.reverse();

docs.forEach(doc=>{

const m=doc.data();

messages.innerHTML+=`
<div class="message">
<span class="username">${m.name}:</span> ${m.text}
</div>
`;

});

messages.scrollTop=messages.scrollHeight;

});

document.getElementById("sendBtn").onclick=sendMessage;

function sendMessage(){

const input=document.getElementById("messageInput");
const text=input.value.trim();

if(text==="") return;

const wordCount=text.split(/\s+/).length;

if(wordCount>15){
alert("Message cannot exceed 15 words.");
return;
}

/* CLEAN TEXT FOR FILTER */

const cleaned = text
.toLowerCase()
.replace(/[\s\.\-_]/g,'');

for(let word of bannedWords){
if(cleaned.includes(word)){
alert("Your message contains blocked words.");
return;
}
}

addDoc(collection(db,"messages"),{
name:username,
text:text,
time:Date.now()
});

input.value="";

}

</script>

</body>
</html>
