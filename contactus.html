<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.contact-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:30px;
border-radius:14px;
max-width:700px;
width:100%;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

h1{
margin-bottom:10px;
}

p{
font-size:14px;
opacity:0.9;
margin-bottom:20px;
}

label{
font-size:14px;
display:block;
margin-bottom:6px;
}

input, textarea{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-bottom:14px;
background:#203a43;
color:white;
}

textarea{
resize:none;
height:120px;
}

button{
background:#ff6a00;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.email{
margin-top:15px;
font-size:14px;
}

.email a{
color:#ff6a00;
text-decoration:none;
font-weight:600;
}

.back{
display:inline-block;
margin-top:20px;
background:#ff6a00;
padding:10px 16px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<div class="contact-box">

<h1>Contact Us</h1>

<p>
If you have any questions, suggestions, or feedback regarding our website or daily current affairs content, feel free to contact us.
</p>

<form action="mailto:support@myaffiliatepage.com" method="post" enctype="text/plain">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Message</label>
<textarea name="message" required></textarea>

<button type="submit">Send Message</button>

</form>

<div class="email">
Or email us directly at  
<a href="mailto:support@myaffiliatepage.com">support@myaffiliatepage.com</a>
</div>

<a href="/" class="back">Back to Home</a>

</div>

</body>
</html>
